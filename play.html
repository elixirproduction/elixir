<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elixir — play</title>
    <meta name="description" content="elixir — play a game.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236e6e6e'/%3E%3Ctext x='16' y='22' font-family='monospace' font-size='18' font-weight='700' text-anchor='middle' fill='%23ffffff'%3Ee%3C/text%3E%3C/svg%3E">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" crossorigin="anonymous" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
    <link rel="preload" href="data/games.js" as="script">
    <link rel="preload" href="data/apps.js" as="script">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" crossorigin="anonymous">
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-1: #111111;
            --panel: #171717;
            --panel-2: #1f1f1f;
            --line: #2a2a2a;
            --line-soft: #202020;
            --text: #dedede;
            --text-2: #999999;
            --text-3: #666666;
            --text-4: #444444;
            --blue: #6e6e6e;
            --blue-2: #5a5a5a;
            --blue-hi: #888888;
            --blue-soft: rgba(255,255,255,0.06);
            --green: #4a7a5a;
            --danger: #7a4a4a;
            --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
            --gap: 12px;
            --radius: 10px;
            --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 12px 28px -18px rgba(0,0,0,0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
            min-height: 100vh; line-height: 1.55; font-size: 15px;
        }
        ::selection { background: rgba(255,255,255,0.1); color: #fff; }
        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; }
        img { display: block; }

        /* ---------- top bar ---------- */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,10,0.7);
            backdrop-filter: saturate(180%) blur(12px);
            -webkit-backdrop-filter: saturate(180%) blur(12px);
            border-bottom: 1px solid var(--line-soft);
        }
        .bar {
            max-width: 1600px; margin: 0 auto; height: 60px;
            display: flex; align-items: center; gap: 28px; padding: 0 28px;
        }
        nav.tabs a.logo-link { color: var(--text); font-weight: 500; }
        nav.tabs { display: flex; gap: 4px; }
        nav.tabs a { font-size: 0.875rem; color: var(--text-3); padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: color .15s; font-weight: 400; }
        nav.tabs a:hover { color: var(--text); }
        nav.tabs a.active { color: var(--text); }
        .bar-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
        .search { position: relative; display: flex; align-items: center; border: 1px solid var(--line-soft); background: transparent; border-radius: 7px; padding: 0 11px; height: 34px; width: 220px; transition: border-color .15s, box-shadow .15s; }
        .search:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
        .search i { color: var(--text-4); font-size: 0.74rem; }
        .search input { background: none; border: none; outline: none; color: var(--text); font-size: 0.84rem; padding: 0 8px; width: 100%; font-family: inherit; }
        .search input::placeholder { color: var(--text-4); }
        .search kbd { font-family: var(--mono); font-size: 0.62rem; color: var(--text-4); border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; background: var(--panel); }
        .search-dd { position: absolute; top: 42px; left: 0; right: 0; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; display: none; z-index: 200; box-shadow: var(--shadow); max-height: 360px; overflow-y: auto; }
        .search-dd.show { display: block; }
        .search-dd .item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; cursor: pointer; font-size: 0.83rem; border-bottom: 1px solid var(--line-soft); transition: background .12s; }
        .search-dd .item:last-child { border-bottom: none; }
        .search-dd .item:hover { background: var(--panel-2); }
        .search-dd .item img { width: 22px; height: 22px; border-radius: 5px; object-fit: cover; }
        .search-dd .item .kind { margin-left: auto; font-family: var(--mono); font-size: 0.6rem; color: var(--text-4); text-transform: uppercase; }
        .proxy-note { display: inline-block; font-size: .55rem; color: #eab308; background: rgba(234,179,8,0.15); padding: 1px 5px; border-radius: 3px; margin-left: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; vertical-align: middle; white-space: nowrap; }
        .search-dd .none { padding: 12px; font-size: 0.82rem; color: var(--text-4); text-align: center; }

        /* ---------- layout ---------- */
        main { max-width: 1600px; margin: 0 auto; padding: 28px 28px 80px; }
        .head { margin-bottom: 20px; display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .head h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; }
        .count { font-family: var(--mono); font-size: 0.72rem; color: var(--text-4); }

        /* ---------- play layout ---------- */
        .play-layout { display: flex; gap: 20px; align-items: flex-start; }
        .play-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .play-sidebar { width: 300px; flex: none; height: calc(100vh - 220px); }
        .banner-ad.tall { width: 100%; height: 100%; }
        .banner-ad.tall img { object-fit: cover; }

        .play-head {
            display: flex; align-items: center; gap: 16px; justify-content: space-between; flex-wrap: wrap; margin-bottom: 16px;
        }
        .play-head h1 { font-size: 1.1rem; font-weight: 550; letter-spacing: -0.01em; }
        .play-controls { display: flex; gap: 8px; }
        .play-controls .btn {
            background: var(--panel-2); color: var(--text-2); border: 1px solid var(--line);
            border-radius: 8px; padding: 7px 13px; font-size: 0.78rem; font-weight: 500; cursor: pointer;
            display: inline-flex; align-items: center; gap: 7px; transition: color .15s, border-color .15s, background .15s;
        }
        .play-controls .btn:hover { color: #fff; border-color: var(--blue); background: var(--blue-soft); }

        .play-frame-wrap {
            width: 100%; height: calc(100vh - 220px); max-height: calc(100vh - 220px);
            background: #000; border: 1px solid var(--line-soft); border-radius: 12px; overflow: hidden;
            position: relative;
        }
        .play-frame-wrap:fullscreen { border-radius: 0; height: 100vh; max-height: 100vh; }
        .play-frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; background: #000; }

        /* game loading screen */
        .game-loading {
            position: absolute; inset: 0; z-index: 5;
            background: var(--panel); display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 14px;
        }
        .game-loading .spinner {
            width: 40px; height: 40px; border: 3px solid var(--line); border-top-color: var(--blue);
            border-radius: 50%; animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---------- banner ads ---------- */
        .banner-ad {
            background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
            overflow: hidden; box-shadow: var(--shadow); position: relative; width: 100%;
        }
        .banner-ad img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .banner-ad img.active { display: block; z-index: 1; }
        body.bg-light .banner-ad { border-color: rgba(0,0,0,0.1); }
        body.has-bg .banner-ad { background: rgba(23,23,23,0.5); backdrop-filter: blur(12px); }

        /* ---------- toast ---------- */
        .toasts { position: fixed; bottom: 18px; right: 18px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--blue); border-radius: 9px; padding: 11px 14px; font-size: 0.8rem; color: var(--text); min-width: 220px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 9px; animation: tin .28s cubic-bezier(0.16,1,0.3,1) both; }
        .toast.good { border-left-color: var(--green); } .toast.warn { border-left-color: #fbbf24; } .toast.err { border-left-color: var(--danger); }
        .toast i { font-size: 0.82rem; } .toast.good i { color: var(--green); } .toast.warn i { color: #fbbf24; } .toast.err i { color: var(--danger); }
        .toast.out { animation: tout .25s ease both; }
        @keyframes tin { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }
        @keyframes tout { to { opacity: 0; transform: translateX(20px); } }

        /* ---------- footer ---------- */
        footer { max-width: 1600px; margin: 0 auto; padding: 22px 28px 40px; border-top: 1px solid var(--line-soft); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; font-size: 0.76rem; color: var(--text-4); }
        footer .links { display: flex; gap: 16px; } footer .links a { cursor: pointer; } footer .links a:hover { color: var(--blue-hi); }

        /* ---------- consent gate ---------- */
        .gate { position: fixed; inset: 0; z-index: 400; display: none; align-items: center; justify-content: center; padding: 24px; background: var(--bg); }
        .gate.show { display: flex; animation: rise .35s cubic-bezier(0.16,1,0.3,1) both; }
        .gate-card { width: 100%; max-width: 420px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 32px 30px; box-shadow: var(--shadow); }
        .gate-logo { font-size: 1.35rem; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 6px; }
        .gate-sub { font-size: 0.85rem; color: var(--text-3); margin-bottom: 22px; line-height: 1.5; }
        .gate-docs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .doc-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; background: var(--bg-1); border: 1px solid var(--line); color: var(--text); padding: 13px 15px; border-radius: 8px; cursor: pointer; font-size: 0.86rem; font-family: inherit; transition: border-color .15s, background .15s; }
        .doc-btn:hover { border-color: var(--blue); background: var(--panel-2); }
        .doc-btn span { font-weight: 500; }
        .doc-btn i { color: var(--text-3); font-size: 0.72rem; }
        .gate-agree { display: flex; align-items: flex-start; gap: 10px; text-align: left; font-size: 0.8rem; color: var(--text-2); margin-bottom: 16px; cursor: pointer; line-height: 1.45; }
        .gate-agree input { margin-top: 2px; flex: none; accent-color: var(--blue); }
        .gate-agree span { user-select: none; }
        .gate-enter { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 12px; font-weight: 550; font-size: 0.9rem; cursor: pointer; font-family: inherit; transition: background .15s, opacity .15s; }
        .gate-enter:hover:not(:disabled) { background: var(--blue-2); }
        .gate-enter:disabled { background: var(--bg-1); color: var(--text-4); border: 1px solid var(--line); opacity: 1; cursor: not-allowed; }

        /* ---------- document modal ---------- */
        .docmodal { position: fixed; inset: 0; z-index: 500; display: none; align-items: center; justify-content: center; padding: 24px; background: rgba(10,10,10,0.85); backdrop-filter: blur(10px); }
        .docmodal.show { display: flex; animation: rise .3s cubic-bezier(0.16,1,0.3,1) both; }
        .doc-win { width: 100%; max-width: 720px; max-height: 82vh; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); }
        .doc-win .top { height: 52px; display: flex; align-items: center; gap: 12px; padding: 0 16px; border-bottom: 1px solid var(--line-soft); background: var(--panel); }
        .doc-win .top .t { font-size: 0.9rem; font-weight: 600; text-transform: lowercase; }
        .doc-win .top .x { margin-left: auto; background: var(--panel-2); border: 1px solid var(--line); color: var(--text-2); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: color .14s, border-color .14s; }
        .doc-win .top .x:hover { color: #fff; border-color: var(--blue); background: var(--blue-soft); }
        .doc-body { padding: 26px 30px; overflow-y: auto; font-size: 0.86rem; line-height: 1.7; color: var(--text-2); }
        .doc-body h4 { color: var(--text); font-size: 0.95rem; font-weight: 600; margin: 20px 0 8px; letter-spacing: -0.01em; }
        .doc-body h4:first-child { margin-top: 0; }
        .doc-body p { margin-bottom: 10px; }
        .doc-body a { color: var(--blue-hi); text-decoration: underline; text-underline-offset: 2px; }

        @media (max-width: 720px) {
            nav.tabs { display: none; }
            .search { width: 150px; }
            .play-layout { flex-direction: column; }
            .play-sidebar { width: 100%; }
        }

        @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

        body.extra-dark { --bg: #050505; --bg-1: #080808; --panel: #0a0a0a; --panel-2: #0f0f0f; --line: #181818; --line-soft: #101010; }

        /* ---------- custom background (blurred) ---------- */
        body.has-bg {
            background: none;
        }
        body.has-bg::before {
            content: ''; position: fixed; inset: 0; z-index: -1;
            background: var(--custom-bg) center/cover no-repeat fixed;
            filter: blur(4px) brightness(0.55) saturate(0.9);
        }
        body.has-bg header { background: rgba(10,10,10,0.4); }
        body.has-bg .play-frame-wrap { background: rgba(0,0,0,0.35); backdrop-filter: blur(6px); border-color: rgba(42,42,42,0.3); }
        body.has-bg .game-loading { background: rgba(23,23,23,0.4); backdrop-filter: blur(12px); }
        body.has-bg footer { background: transparent; border-color: rgba(255,255,255,0.08); backdrop-filter: none; }
        body.has-bg .play-head h1 { text-shadow: 0 2px 8px rgba(0,0,0,0.7); }
        body.has-bg .logo { text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
        body.has-bg .count { text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
        body.bg-light { --text: #1a1a1a; --text-2: #333; --text-3: #555; --text-4: #888; --panel: rgba(255,255,255,0.7); --panel-2: rgba(255,255,255,0.8); --bg-1: rgba(255,255,255,0.5); --line: rgba(0,0,0,0.12); --line-soft: rgba(0,0,0,0.06); }
        body.bg-light .play-head h1 { text-shadow: none; }
        body.bg-light .logo { text-shadow: none; }
    </style>
</head>
<body>

    <header>
        <div class="bar">
            <nav class="tabs">
                <a class="logo-link" onclick="window.location.href='index.html'">elixir</a>
                <a onclick="goHome()">games</a>
                <a onclick="goHome()">apps</a>
                <a onclick="goHome()">proxy</a>
                <a onclick="goHome()">settings</a>
            </nav>
            <div class="bar-right">
                <div class="search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="q" placeholder="search…" autocomplete="off">
                    <kbd>/</kbd>
                    <div class="search-dd" id="dd"></div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="play-head">
            <h1 id="gameName">game</h1>
            <div style="display:flex;align-items:center;gap:14px;font-size:0.82rem;color:var(--text-3)">
                <span id="clk">--:--</span>
                <span id="bat">--</span>
                <span class="count" id="wispStatus">wisp: —</span>
            </div>
            <div class="play-controls">
                <button class="btn" onclick="goHome()" title="back to games"><i class="fas fa-arrow-left"></i> back</button>
                <button class="btn" onclick="toggleFs()" title="fullscreen"><i class="fas fa-expand"></i> fullscreen</button>
            </div>
        </div>

        <div class="play-layout">
            <div class="play-main">
                <div class="play-frame-wrap" id="playFrameWrap">
                    <div class="game-loading" id="gameLoading">
                        <div class="spinner"></div>
                        <span style="font-size:0.8rem;color:var(--text-3)">loading game…</span>
                    </div>
                    <iframe id="playFrame" src="" allow="autoplay; fullscreen; cross-origin-isolated"></iframe>
                </div>
            </div>
            <div class="play-sidebar">
                <div class="banner-ad tall" id="sidebarAd"></div>
            </div>
        </div>
    </main>

    <footer>
        <div>&copy; <span id="yr"></span> elixir. <span id="footerMsg">built quiet.</span></div>
        <div class="links"><a onclick="openDoc('terms')">terms of service</a><a onclick="openDoc('privacy')">privacy policy</a><a onclick="goHome()">games</a><a onclick="goHome()">settings</a></div>
    </footer>

    <!-- consent gate -->
    <div class="gate" id="gate">
        <div class="gate-card">
            <div class="gate-logo"><svg width="80" height="22" viewBox="0 0 80 22" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="22" height="22" rx="6" fill="#6e6e6e"/><text x="11" y="15" text-anchor="middle" fill="#fff" font-family="'JetBrains Mono',monospace" font-size="12" font-weight="700">e</text><text x="28" y="16" fill="currentColor" font-family="'Inter',system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" letter-spacing="-0.3">elixir</text></svg></div>
            <p class="gate-sub">read the docs, then you're in.</p>
            <div class="gate-docs">
                <button class="doc-btn" onclick="openDoc('terms')"><span>terms of service</span><i class="fas fa-chevron-right"></i></button>
                <button class="doc-btn" onclick="openDoc('privacy')"><span>privacy policy</span><i class="fas fa-chevron-right"></i></button>
            </div>
            <label class="gate-agree"><input type="checkbox" id="agreeBox"><span>i've read and agree to the terms of service and privacy policy.</span></label>
            <button class="gate-enter" id="enterBtn" disabled>enter site</button>
        </div>
    </div>

    <!-- consent gate script -->
    <script>
      (function () {
        var AGREE_KEY = 'elixir_agreed';
        var gate = document.getElementById('gate');
        var enterBtn = document.getElementById('enterBtn');
        var agreeBox = document.getElementById('agreeBox');
        if (!gate) return;
        if (localStorage.getItem(AGREE_KEY) === '1') {
          gate.style.display = 'none';
          gate.classList.remove('show');
          document.body.style.overflow = '';
          return;
        }
        gate.classList.add('show');
        gate.style.display = '';
        document.body.style.overflow = 'hidden';
        if (enterBtn && agreeBox) {
          enterBtn.disabled = !agreeBox.checked;
          agreeBox.addEventListener('change', function () { enterBtn.disabled = !agreeBox.checked; });
          enterBtn.addEventListener('click', function () {
            if (!agreeBox.checked) { if (window.toast) toast('check the box to continue', 'warn'); return; }
            try { localStorage.setItem(AGREE_KEY, '1'); } catch (e) {}
            location.reload();
          });
        }
      })();
    </script>

    <!-- document modal -->
    <div class="docmodal" id="docmodal">
        <div class="doc-win">
            <div class="top"><div class="t" id="docTitle">—</div><button class="x" onclick="closeDoc()"><i class="fas fa-xmark"></i></button></div>
            <div class="doc-body" id="docBody"></div>
        </div>
    </div>

    <div class="toasts" id="toasts"></div>

    <script src="data/games.js"></script>
    <script src="data/apps.js"></script>
    <script>
        /* ---- constants ---- */
        const LS_FAV = 'elixir_fav';
        const DEFAULT_WISP = 'wss://wisp.mercurywork.shop/wisp/';
        const WISP_SERVERS = [
            'wss://wisp.mercurywork.shop/wisp/',
            'wss://anura.pro/wisp/',
            'wss://wisp.rhw.one/wisp/',
            'wss://wisp.sanitarium.tech/wisp/'
        ];

        /* ---- utils ---- */
        function toast(msg, kind = '') {
            const w = document.getElementById('toasts');
            const el = document.createElement('div');
            el.className = 'toast ' + kind;
            const ic = kind === 'good' ? 'fa-circle-check' : kind === 'warn' ? 'fa-triangle-exclamation' : kind === 'err' ? 'fa-circle-xmark' : 'fa-circle-info';
            el.innerHTML = `<i class="fas ${ic}"></i><span>${msg}</span>`;
            w.appendChild(el);
            setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 250); }, 2400);
        }

        function getFav() { try { return JSON.parse(localStorage.getItem(LS_FAV)) || []; } catch { return []; } }
        function setFav(a) { localStorage.setItem(LS_FAV, JSON.stringify(a)); }

        function setFavicon(href) { let l = document.querySelector("link[rel~='icon']"); if (!l) { l = document.createElement('link'); l.rel = 'icon'; document.head.appendChild(l); } l.href = href; }

        /* ---- navigation ---- */
        function goHome() { window.location.href = 'index.html'; }

        /* ---- game loading ---- */
        function initial(url) {
            if (!url) return 'about:blank';
            if (/^(https?:|about:|blob:|data:)/i.test(url)) return url;
            return url.replace(/^\/+/, '');
        }

        function loadGame(url, title, kind) {
            url = initial(url);
            var isExternal = /^https?:\/\//i.test(url);
            document.getElementById('gameName').innerHTML = (title || 'game') + (isExternal && kind !== 'app' ? '<span class="proxy-note">slow load</span>' : '');
            const frame = document.getElementById('playFrame');
            const loading = document.getElementById('gameLoading');
            if (isExternal) {
                url = 'reactive/game.html?url=' + encodeURIComponent(url);
            }
            frame.style.visibility = 'hidden';
            frame.style.position = 'absolute';
            loading.style.display = 'flex';
            var loaded = false;
            function done() {
                if (loaded) return;
                loaded = true;
                loading.style.display = 'none';
                frame.style.visibility = 'visible';
                frame.style.position = '';
            }
            frame.onload = done;
            frame.onerror = done;
            setTimeout(done, 8000);
            try { frame.src = url; } catch(e) { setTimeout(done, 100); }
        }

        function detectBgBrightness(dataUrl) {
            var img = new Image();
            img.onload = function() {
                var c = document.createElement('canvas');
                c.width = 32; c.height = 32;
                var ctx = c.getContext('2d');
                ctx.drawImage(img, 0, 0, 32, 32);
                var p = ctx.getImageData(0, 0, 32, 32).data;
                var sum = 0, n = p.length / 4;
                for (var i = 0; i < p.length; i += 4) { sum += p[i] * 0.299 + p[i+1] * 0.587 + p[i+2] * 0.114; }
                document.body.classList.toggle('bg-light', sum / n > 160);
            };
            img.src = dataUrl;
        }

        /* ---- fullscreen ---- */
        function toggleFs() {
            const el = document.getElementById('playFrameWrap');
            if (!el) return;
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else if (el.requestFullscreen) {
                el.requestFullscreen();
            } else if (el.webkitRequestFullscreen) {
                el.webkitRequestFullscreen();
            }
        }
        document.addEventListener('fullscreenchange', () => {
            const btn = document.querySelector('.play-controls .btn[onclick="toggleFs()"] i');
            if (btn) btn.className = document.fullscreenElement ? 'fas fa-compress' : 'fas fa-expand';
        });

        /* ---- search ---- */
        const q = document.getElementById('q'), dd = document.getElementById('dd');
let ALL_GAMES = Array.isArray(window.games) ? window.games.filter(g => g.app !== true).map(g => {
    var u = g.url || g.iframe || '';
    return { title: g.name || 'game', img: g.img ? (g.img.startsWith('/') ? g.img : '/' + g.img.replace(/^\/+/,'')) : '',
    url: u, id: g.identifier || (g.name||'g').toLowerCase().replace(/\s+/g,'-'),
    pinned: g.pin === true, proxied: /^https?:\/\//i.test(u) };
}) : [];
        q.addEventListener('input', () => {
            const v = q.value.toLowerCase().trim();
            if (!v) { dd.classList.remove('show'); return; }
            const hit = ALL_GAMES.filter(g => (g.title || '').toLowerCase().includes(v)).slice(0, 10);
            if (!hit.length) { dd.innerHTML = `<div class="none">no matches</div>`; dd.classList.add('show'); return; }
            dd.innerHTML = hit.map(g => `<div class="item" data-url="${g.url.replace(/'/g,"\\'")}" data-title="${(g.title||'').replace(/'/g,"\\'")}">
                ${g.img ? `<img src="${g.img}" onerror="this.style.visibility='hidden'">` : `<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E">`}
                <span>${g.title}${g.proxied?'<span class="proxy-note">slow load</span>':''}</span><span class="kind">game</span>
            </div>`).join('');
            dd.classList.add('show');
        });
        document.addEventListener('click', e => {
            const item = e.target.closest('.search-dd .item');
            if (item) { openGame(item.dataset.url, item.dataset.title); dd.classList.remove('show'); q.value = ''; return; }
            if (!e.target.closest('.search')) dd.classList.remove('show');
        });
        document.addEventListener('keydown', e => {
            if (e.key === '/' && document.activeElement !== q) { e.preventDefault(); q.focus(); }
            if (e.key === 'Escape') { dd.classList.remove('show'); }
        });

        function openGame(url, title) {
            window.location.href = 'play.html?url=' + encodeURIComponent(initial(url)) + '&title=' + encodeURIComponent(title || 'game');
        }

        /* ---- wisp status ---- */
        (function renderWispStatus(){
            const el = document.getElementById('wispStatus');
            if (!el) return;
            const u = localStorage.getItem('proxServer') || DEFAULT_WISP;
            el.textContent = 'wisp: ' + u.replace(/^wss?:\/\//,'').replace(/\/$/,'');
            el.title = u;
        })();

        /* ---- clock ---- */
        function tickClock() {
            const d = new Date();
            let h = d.getHours();
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12; if (h === 0) h = 12;
            const m = String(d.getMinutes()).padStart(2, '0');
            const s = String(d.getSeconds()).padStart(2, '0');
            const el = document.getElementById('clk'); if (el) el.textContent = h + ':' + m + ':' + s + ' ' + ampm;
        }
        tickClock(); setInterval(tickClock, 1000);
        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                const upd = () => { const e = document.getElementById('bat'); if (e) e.textContent = Math.round(b.level * 100) + (b.charging ? '⚡' : '%'); };
                upd(); b.addEventListener('levelchange', upd); b.addEventListener('chargingchange', upd);
            }).catch(() => { const e = document.getElementById('bat'); if (e) e.textContent = 'n/a'; });
        } else { const e = document.getElementById('bat'); if (e) e.textContent = 'n/a'; }

        /* ---- panic key ---- */
        let binding = false;
        document.addEventListener('keydown', e => {
            if (binding) { return; }
            const p = JSON.parse(localStorage.getItem('elixir_panic') || '{}');
            if (e.key === p.key && p.url) window.location.href = p.url;
        });

        /* ---- terms / privacy ---- */
        const DOCS_EFFECTIVE = '2026-07-22';
        const DOCS = {
            terms: {
                title: 'terms of service',
                html: `<h4>1. acceptance</h4><p>by using elixir you agree to these terms. if you do not agree, do not use the site.</p>
                <h4>2. use of the proxy</h4><p>the built-in proxy is provided for general browsing. you are responsible for what you access through it. do not use it for anything illegal in your jurisdiction.</p>
                <h4>3. games</h4><p>games are loaded through third-party embed frames or proxied iframes. elixir does not host the games and is not affiliated with their owners. all game progress is saved locally on your device.</p>
                <h4>4. school and institutional use</h4><p>elixir is a personal project and is not affiliated with any school, employer, or institution. you alone are responsible for following your organization's rules. the creators of elixir are not responsible for any disciplinary action taken against you as a result of your use of this site. use at your own risk.</p>
                <h4>5. user data</h4><p>all data (favorites, settings, game progress, custom background) is stored in your browser's local storage. no data is sent to any server. elixir is fully static — there is no backend, no database, and no user accounts.</p>
                <h4>6. no warranty</h4><p>elixir is provided "as is" with no warranties of any kind. we are not liable for any damages or consequences arising from use of the site.</p>
                <h4>7. changes</h4><p>we may update these terms at any time. continued use after changes means you accept the new terms.</p>`
            },
            privacy: {
                title: 'privacy policy',
                html: `<h4>1. what we store locally</h4><p>on your device, elixir stores favorites, cloak settings, proxy server choice, panic key, and custom background in your browser's local storage. this data never leaves your device because there is no server to send it to.</p>
                <h4>2. proxy traffic</h4><p>when you use the proxy, requests are routed through a third-party wisp transport server you select. those operators may log connection metadata. we do not control and are not responsible for third-party servers.</p>
                <h4>3. cookies</h4><p>no tracking cookies are set. a local flag is stored to remember you accepted these policies.</p>
                <h4>4. children</h4><p>elixir is not directed at children under 13.</p>
                <h4>5. contact</h4><p>this is a personal project with no commercial operator. use at your own discretion.</p>`
            }
        };
        function openDoc(kind) {
            const d = DOCS[kind]; if (!d) return;
            document.getElementById('docTitle').textContent = d.title;
            document.getElementById('docBody').innerHTML = '<p style="color:var(--text-4);font-size:.75rem;margin-bottom:14px">effective ' + DOCS_EFFECTIVE + '</p>' + d.html;
            document.getElementById('docmodal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        function closeDoc() {
            document.getElementById('docmodal').classList.remove('show');
            document.body.style.overflow = (document.getElementById('gate').classList.contains('show') ? 'hidden' : '');
        }
        document.getElementById('docmodal').addEventListener('click', e => { if (e.target.id === 'docmodal') closeDoc(); });

        /* ---- boot ---- */
        document.getElementById('yr').textContent = new Date().getFullYear();

        // apply cloak if set
        const savedCloak = JSON.parse(localStorage.getItem('tabCloak') || '{}');
        if (savedCloak.t) { document.title = savedCloak.t; setFavicon(savedCloak.i); }

        // apply custom background if set
        const bgData = localStorage.getItem('elixir_bg');
        if (bgData) {
            document.body.classList.add('has-bg');
            document.body.style.setProperty('--custom-bg', 'url(' + bgData + ')');
            detectBgBrightness(bgData);
        }

        /* ---------- ads (configurable — PNG only) ---------- */
        var SIDEBAR_ADS = [
            'builtinads/welcome.png',
            'builtinads/credits.png',
        ];

        function setupAd(containerId, images) {
            var c = document.getElementById(containerId);
            if (!c) return;
            images.forEach(function(src) {
                var img = document.createElement('img');
                img.src = src;
                img.alt = 'advertisement';
                c.appendChild(img);
            });
            var imgs = c.querySelectorAll('img');
            if (imgs.length) {
                imgs[0].classList.add('active');
                var i = 0;
                setInterval(function() {
                    imgs[i].classList.remove('active');
                    i = (i + 1) % imgs.length;
                    imgs[i].classList.add('active');
                }, 3000);
            }
        }

        setupAd('sidebarAd', SIDEBAR_ADS);

        // load game from URL params
        const params = new URLSearchParams(window.location.search);
        const gameUrl = params.get('url') || '';
        const gameTitle = params.get('title') || 'game';
        const gameKind = params.get('kind') || 'game';
        
        if (gameUrl) {
            loadGame(gameUrl, gameTitle, gameKind);
        }
    </script>
</body>
</html>
