<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNF Mod Menu</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fixed Background Layer */
        .engine-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Centered Header */
        .header-overlay {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            z-index: 2;
            pointer-events: none;
        }

        .title-img { width: 160px; height: auto; }

        /* Grid */
        .grid-container {
            position: relative;
            z-index: 3;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            padding: 120px 50px;
            box-sizing: border-box;
            overflow-y: auto;
            height: 100vh;
        }

        /* Glass Icon Style */
        .game-card {
            width: 180px; /* Made slightly wider to fit text better */
            height: 220px; /* Made taller to accommodate text */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            flex-direction: column; /* Stack elements vertically */
            align-items: center;
            justify-content: flex-start;
            padding: 15px;
            box-sizing: border-box;
            transition: transform 0.15s ease-out, background 0.2s;
            color: white; /* All text is white */
            text-align: center;
        }

        .game-card:hover { 
            transform: translateY(-5px); 
            background: rgba(255, 255, 255, 0.2); 
            border-color: rgba(255, 255, 255, 0.5);
        }

        .game-card img { 
            width: 80px; 
            height: 80px; 
            object-fit: contain;
            margin-bottom: 15px;
            pointer-events: none; 
        }

        .game-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .game-desc {
            font-size: 0.75rem;
            opacity: 0.9;
            line-height: 1.2;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* Pop-up Window */
        #game-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .game-window {
            width: 85vw;
            height: 80vh;
            background: #000;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .exit-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1001;
            padding: 8px 14px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="engine-canvas"></div>

    <div class="header-overlay">
        <img src="fnftitle.png" alt="Title" class="title-img">
    </div>

    <div class="grid-container">
        
        <div class="game-card" onclick="openWindow('fnfog.html')">
            <img src="fnfog.png" alt="Icon">
            <div class="game-name">Friday Night Funkin'</div>
            <div class="game-desc">The unmodded, original version of the game.</div>
        </div>
        
        <div class="game-card" onclick="openWindow('fnftaintedfate.html')">
            <img src="fnftaintedfate.png" alt="Icon">
            <div class="game-name">Friday Night Funkin' VS Imposter: Tainted Fate</div>
            <div class="game-desc">Fight in musical battles against twisted Among Us imposters!</div>
        </div>
        
        <div class="game-card" onclick="openWindow('fnfconfrontingyourself.html')">
            <img src="fnfconfrontingyourself.png" alt="Icon">
            <div class="game-name">Friday Night Funkin': Confronting Yourself FF Remix</div>
            <div class="game-desc">Sing as Sonic aids you in your escape from Sonic.EXE!</div>
        </div>

        </div>

    <div id="game-modal-overlay">
        <div class="game-window">
            <button class="exit-btn" onclick="closeWindow()">EXIT</button>
            <iframe id="game-frame" src=""></iframe>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('game-modal-overlay');
        const frame = document.getElementById('game-frame');

        function openWindow(url) {
            frame.src = url;
            overlay.style.display = 'flex';
        }

        function closeWindow() {
            overlay.style.display = 'none';
            frame.src = ''; 
        }

        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) closeWindow();
        });
    </script>

</body>
</html>
